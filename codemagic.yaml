workflows:
  unity-android-workflow:
    name: Unity Android Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      vars:
        UNITY_VERSION: "2022.3.0f1"
      secrets:
        - FIREBASE_APP_ID
        - FIREBASE_TOKEN
        - FIREBASE_EMAIL
    scripts:
      - name: Install Unity
        script: |
          # Install Unity Hub
          brew install --cask unity-hub
          
          # Install Unity Editor
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install --version $UNITY_VERSION --changeset 3b38c6e8c4d0 --architecture arm64 2>&1 || true
      - name: Build Android APK
        script: |
          # Find Unity installation
          UNITY_PATH="/Applications/Unity/Hub/Editor/$UNITY_VERSION/Unity.app/Contents/MacOS/Unity"
          
          if [ ! -f "$UNITY_PATH" ]; then
            echo "Unity not found at $UNITY_PATH"
            UNITY_PATH=$(find /Applications/Unity/Hub/Editor -name "Unity" -type f | head -1)
            echo "Using Unity at: $UNITY_PATH"
          fi
          
          # Build APK
          "$UNITY_PATH" \
            -projectPath . \
            -executeMethod BuildScript.BuildAndroid \
            -nographics \
            -logFile - \
            -quit || true
      - name: Deploy to Firebase App Distribution
        script: |
          # Install Firebase CLI
          npm install -g firebase-tools
          
          # Find the built APK
          APK_PATH=$(find build/outputs/apk -name "*.apk" -type f | head -1)
          
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          
          echo "Found APK: $APK_PATH"
          
          # Deploy to Firebase App Distribution
          firebase appdistribution:distribute "$APK_PATH" \
            --app=$FIREBASE_APP_ID \
            --release-notes="Automated build from Codemagic" \
            --testers-file=testers.txt \
            --token=$FIREBASE_TOKEN
    artifacts:
      - build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - $FIREBASE_EMAIL
        notify:
          success: true
          failure: true
