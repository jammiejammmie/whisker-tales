workflows:
  unity-android-workflow:
    name: Unity Android Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      vars:
        UNITY_VERSION: "2022.3.0f1"
    scripts:
      - name: Install Unity
        script: |
          # Install Unity Hub
          brew install --cask unity-hub
          
          # Install Unity Editor
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install --version $UNITY_VERSION --changeset 3b38c6e8c4d0 --architecture arm64 2>&1 || true
      - name: Build Android APK
        script: |
          # Find Unity installation
          UNITY_PATH="/Applications/Unity/Hub/Editor/$UNITY_VERSION/Unity.app/Contents/MacOS/Unity"
          
          if [ ! -f "$UNITY_PATH" ]; then
            echo "Unity not found at $UNITY_PATH"
            UNITY_PATH=$(find /Applications/Unity/Hub/Editor -name "Unity" -type f | head -1)
            echo "Using Unity at: $UNITY_PATH"
          fi
          
          # Build APK
          "$UNITY_PATH" \
            -projectPath . \
            -executeMethod BuildScript.BuildAndroid \
            -nographics \
            -logFile - \
            -quit || true
      - name: Verify APK Build
        script: |
          # Find APK file
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null | head -20
          
          APK_FILE=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          
          if [ -z "$APK_FILE" ]; then
            echo "❌ APK file not found"
            echo "Build directory contents:"
            ls -la build/ 2>/dev/null || echo "No build directory"
            exit 1
          fi
          
          echo "✅ Found APK: $APK_FILE"
          echo "APK file size: $(du -h "$APK_FILE" | cut -f1)"
    artifacts:
      - build/app/outputs/apk/**/*.apk
      - build/app/outputs/bundle/**/*.aab
      - build/outputs/apk/**/*.apk
      - build/outputs/bundle/**/*.aab
      - "**/*.apk"
