workflows:
  unity-android-workflow:
    name: Unity Android Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      vars:
        UNITY_VERSION: "2022.3.0f1"
    scripts:
      - name: Build Android APK
        script: |
          # Use pre-installed Unity (skip installation)
          # Codemagic has Unity 2022.3 pre-installed
          UNITY_PATH="/Applications/Unity/Hub/Editor/$UNITY_VERSION/Unity.app/Contents/MacOS/Unity"
          
          # If not found, search for available Unity
          if [ ! -f "$UNITY_PATH" ]; then
            echo "Searching for available Unity installations..."
            UNITY_PATH=$(find /Applications/Unity/Hub/Editor -name "Unity" -type f | head -1)
            if [ -z "$UNITY_PATH" ]; then
              echo "ERROR: Unity not found!"
              exit 1
            fi
            echo "Found Unity at: $UNITY_PATH"
          fi
          
          echo "Using Unity at: $UNITY_PATH"
          
          # Build APK
          "$UNITY_PATH" \
            -projectPath . \
            -executeMethod BuildScript.BuildAndroid \
            -nographics \
            -logFile - \
            -quit || true
    artifacts:
      - build/outputs/apk/**/*.apk
